<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - CCMS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="register">
  <section class="auth-shell">
    <article class="auth-card">
      <h1 class="auth-title">Create Student Account</h1>
      <p class="muted">Register with your college details to join clubs and events.</p>
      <form id="registerForm" class="form-grid">
        <label>Full Name
          <input type="text" name="name" required />
        </label>
        <label>Email
          <input type="email" name="email" required />
        </label>
        <label>Roll Number
          <input type="text" name="rollNumber" required />
        </label>
        <label>Password
          <input type="password" name="password" required minlength="6" />
        </label>
        <button class="btn btn-primary" type="submit">Register</button>
      </form>
      <p id="authMessage" class="muted" style="margin-top:10px;"></p>
      <p class="muted" style="margin-top:12px;">Already registered? <a href="login.html" class="view-all">Login</a></p>
    </article>
  </section>
  <script src="js/app.js"></script>
</body>
</html>
