<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - CCMS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="profile">
  <nav>
    <a href="index.html" class="nav-brand">
      <div class="logo-mark">CC</div>
      <div class="brand-text">
        <span class="brand-name">College Club Management System</span>
        <span class="brand-sub">Profile</span>
      </div>
    </a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="clubs.html">Clubs</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="profile.html" class="active">Profile</a></li>
      <li><a href="#" data-action="logout">Logout</a></li>
    </ul>
  </nav>

  <section class="page-wrap">
    <div class="container">
      <article class="panel" style="max-width:760px;">
        <h2>Edit Profile</h2>
        <p class="muted">Email: <span id="profileEmail"></span> | Role: <span id="profileRole"></span></p>
        <form id="profileForm" class="form-grid">
          <label>Name
            <input type="text" id="profileName" required />
          </label>
          <label>Bio
            <textarea id="profileBio" rows="4"></textarea>
          </label>
          <label>Profile Picture URL
            <input type="text" id="profilePicture" placeholder="https://example.com/photo.jpg" />
          </label>
          <button class="btn btn-primary" type="submit">Save Profile</button>
        </form>
        <p id="profileMessage" class="muted" style="margin-top:10px;"></p>

        <hr style="border:1px solid rgba(255,255,255,0.08); margin:18px 0;" />

        <h3>Change Password</h3>
        <form id="passwordForm" class="form-grid">
          <label>Current Password
            <input type="password" id="currentPassword" required />
          </label>
          <label>New Password
            <input type="password" id="newPassword" minlength="6" required />
          </label>
          <button class="btn btn-primary" type="submit">Update Password</button>
        </form>
        <p id="passwordMessage" class="muted" style="margin-top:10px;"></p>
      </article>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
